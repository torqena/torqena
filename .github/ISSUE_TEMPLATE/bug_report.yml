name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! This helps us improve Torqena for everyone.

  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which Torqena product are you using?
      options:
        - Obsidian Plugin
        - Desktop App (Shell)
        - Website
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: "e.g., 0.0.48"

  - type: textarea
    id: system
    attributes:
      label: System Information
      description: Your OS, browser, or Obsidian version.
      placeholder: |
        - OS: macOS 15.4 / Windows 11 / Ubuntu 24.04
        - Obsidian: 1.8.x (if plugin)
        - Browser: Chrome 130 (if website)

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or error messages if available.

  - type: dropdown
    id: severity
    attributes:
      label: How severe is this?
      options:
        - "App crashes or data loss"
        - "Feature broken, no workaround"
        - "Feature broken, workaround exists"
        - "Minor / cosmetic"
    validations:
      required: true
